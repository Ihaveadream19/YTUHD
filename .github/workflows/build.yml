name: Build YTUHD

on:

  workflow_dispatch:

  push:

jobs:

  build:

    runs-on: macos-latest

    steps:

      # ─────────────────────────────

      # Checkout

      # ─────────────────────────────

      - name: Checkout

        uses: actions/checkout@v4

      # ─────────────────────────────

      # Tools

      # ─────────────────────────────

      - name: Install tools

        run: brew install make xz ldid

      # ─────────────────────────────

      # Theos

      # ─────────────────────────────

      - name: Setup Theos

        run: |

          git clone --recursive https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────

      # SDKs

      # ─────────────────────────────

      - name: Setup SDK

        run: |

          rm -rf $HOME/theos/sdks

          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────

      # Build tweak

      # ─────────────────────────────

      - name: Build YTUHD

        run: |

          make clean || true

          make package FINALPACKAGE=1

      # ─────────────────────────────

      # Find dylib

      # ─────────────────────────────

      - name: Find output

        run: find . -name "*.dylib"

      # ─────────────────────────────

      # Collect output

      # ─────────────────────────────

      - name: Collect dylib

        run: |

          mkdir -p output

          find .theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────

      # Upload artifact

      # ─────────────────────────────

      - name: Upload

        uses: actions/upload-artifact@v4

        with:

          name: YTUHD

          path: output/
