name: Build YTUHD

on:

  workflow_dispatch:

  push:

jobs:

  build:

    runs-on: macos-latest

    steps:

      # ─────────────────────────────

      # Checkout

      # ─────────────────────────────

      - name: Checkout

        uses: actions/checkout@v4

      # ─────────────────────────────

      # Tools

      # ─────────────────────────────

      - name: Install tools

        run: brew install make xz ldid

      # ─────────────────────────────

      # Theos

      # ─────────────────────────────

      - name: Setup Theos

        run: |

          git clone --recursive https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────

      # SDK

      # ─────────────────────────────

      - name: Setup SDK

        run: |

          rm -rf $HOME/theos/sdks

          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────

      # YouTubeHeader (PINNED OLD VERSION)

      # ─────────────────────────────

      - name: Setup YouTubeHeader

        run: |

          git clone https://github.com/PoomSmart/YouTubeHeader.git YouTubeHeader

          cd YouTubeHeader

          git checkout 6a3c2f0

          cd ..

          mkdir -p $HOME/theos/include/YouTubeHeader

          cp -R YouTubeHeader/* $HOME/theos/include/YouTubeHeader/

      # ─────────────────────────────

      # PSHeader (optional, falls gebraucht)

      # ─────────────────────────────

      - name: Setup PSHeader

        run: |

          git clone https://github.com/Ihaveadream19/PSHeader.git PSHeader

          mkdir -p $HOME/theos/include/PSHeader

          cp -R PSHeader/* $HOME/theos/include/PSHeader/

      # ─────────────────────────────

      # Build

      # ─────────────────────────────

      - name: Build tweak

        run: |

          make clean || true

          make package FINALPACKAGE=1

      # ─────────────────────────────

      # Find dylib

      # ─────────────────────────────

      - name: Find output

        run: find . -name "*.dylib"

      # ─────────────────────────────

      # Collect dylib

      # ─────────────────────────────

      - name: Collect dylib

        run: |

          mkdir -p output

          find .theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────

      # Upload

      # ─────────────────────────────

      - name: Upload

        uses: actions/upload-artifact@v4

        with:

          name: YTUHD

          path: output/
